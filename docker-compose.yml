version: '3.8'

services:
  # SQL Server Database
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: corporatewebsite_db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Passw0rd
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "YourStrong@Passw0rd" -Q "SELECT 1"
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - corporatewebsite_network

  # PostgreSQL Alternative (uncomment to use instead of SQL Server)
  # db:
  #   image: postgres:15-alpine
  #   container_name: corporatewebsite_db
  #   environment:
  #     - POSTGRES_DB=CorporateWebsite
  #     - POSTGRES_USER=postgres
  #     - POSTGRES_PASSWORD=YourStrong@Passw0rd
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U postgres"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 10
  #   networks:
  #     - corporatewebsite_network

  # Redis for Caching and Session
  redis:
    image: redis:7-alpine
    container_name: corporatewebsite_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - corporatewebsite_network

  # Web Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: corporatewebsite_web
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=db;Database=CorporateWebsite;User=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=true;MultipleActiveResultSets=true
      - Database__Provider=SqlServer
      - Email__SmtpHost=${SMTP_HOST:-}
      - Email__SmtpPort=${SMTP_PORT:-587}
      - Email__SmtpUsername=${SMTP_USERNAME:-}
      - Email__SmtpPassword=${SMTP_PASSWORD:-}
      - Email__SmtpEnableSsl=true
      - Email__FromEmail=${SMTP_FROM_EMAIL:-}
      - Email__FromName=Corporate Website
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/wwwroot/uploads
      - logs_data:/app/logs
      - backups_data:/app/backups
    networks:
      - corporatewebsite_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: corporatewebsite_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - uploads_data:/var/www/uploads:ro
    depends_on:
      - web
    networks:
      - corporatewebsite_network
    restart: unless-stopped

volumes:
  sqlserver_data:
  # postgres_data:
  redis_data:
  uploads_data:
  logs_data:
  backups_data:

networks:
  corporatewebsite_network:
    driver: bridge